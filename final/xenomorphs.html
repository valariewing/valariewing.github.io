<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xenomorph Page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  
<style>
.about-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:30px;
}

/* Reused for Xenomorph Types */
.card-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

/* Existing Gallery */
.gallery-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

/* Responsive */
@media(max-width:768px){

.about-grid{
grid-template-columns:1fr;
}

.card-grid,
.gallery-grid{
grid-template-columns:1fr;
}

}
</style>

<header>
<h1>Xenomorph</h1>

<nav>
<ul>
<li>Home</li>
<li>Predator</li>
<li>Xenomorph</li>
<li>Harvester</li>
</ul>
</nav>
</header>

<section class="hero">
<h2>Xenomorph Species</h2>
</section>

<!-- Existing About Grid reused -->
<section class="about-grid">

<div class="box">
Image Placeholder
</div>

<div class="box">
<h2>Species Overview</h2>
<p>
Information about Xenomorphs goes here.
</p>
</div>

</section>


<!-- Reuses existing card-grid from Predator page -->
<section class="abilities">

<h2>Xenomorph Types</h2>

<div class="card-grid">

<div class="card">
Drone
</div>

<div class="card">
Warrior
</div>

<div class="card">
Queen
</div>

</div>

</section>


<!-- Existing gallery reused -->
<section class="gallery">

<h2>Gallery</h2>

<div class="gallery-grid">

<div class="image-box">Image 1</div>
<div class="image-box">Image 2</div>
<div class="image-box">Image 3</div>

</div>

</section>


<footer>
Footer
</footer>

</body>
</html>
