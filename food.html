<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>USDA Food Pyramid</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<style> 
  body {
    font-family: Arial;
}

table {
    border-collapse: collapse;
    margin: auto;
    width: 600px;
}

caption {
    font-size: 28px;
    font-weight: bold;
    padding: 10px;
}

th, td {
    border: 1px solid #666;
    padding: 10px;
}

thead th {
    background-color: #2f8f5b;
    color: white;
    text-align: center;
}

tbody td:first-child {
    text-align: left;
}

td {
    text-align: center;
}
</style>
<table>
    <caption>USDA Food Pyramid</caption>

    <thead>
        <tr>
            <th rowspan="2">Food Group</th>
            <th colspan="2">Serving Guidelines</th>
        </tr>
        <tr>
            <th>2005-2010</th>
            <th>2011-present</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td><strong>Dairy</strong><br><em>(milk, yogurt, cheese)</em></td>
            <td>2-3</td>
            <td>3-4</td>
        </tr>

        <tr>
            <td><strong>Meat and Beans</strong><br><em>(beef, poultry, fish, beans)</em></td>
            <td>2-3</td>
            <td>5-6</td>
        </tr>

        <tr>
            <td>Fruits</td>
            <td>2-4</td>
            <td>2-4</td>
        </tr>

        <tr>
            <td>Vegetables</td>
            <td>3-5</td>
            <td>1-2</td>
        </tr>

        <tr>
            <td><strong>Grains</strong><br><em>(bread, donuts, pop tarts)</em></td>
            <td>1-2</td>
            <td>3-5</td>
        </tr>
    </tbody>
</table>

</body>
</html>
