<!DOCTYPE html>
<html lang="en">
<style>
  body{
    font-family: Arial, sans-serif;
}
.container{
    width: 600px;
    margin: auto;
}
h2{
    text-align: center;
}
table{
    width: 100%;
    border-collapse: collapse;
}
td, th{
    border: 2px solid #5a6fb0;
    padding: 8px;
}
.header{
    font-weight: bold;
}
.black-bar{
    background-color: black;
    height: 20px;
}
.right{
    text-align: right;
}
</style>

<head>
<meta charset="UTF-8">
<title>Customer Order Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
<h2>Customer Order Form</h2>

<table>
<tr>
<td colspan="4">Order Number</td>
</tr>

<tr>
<td colspan="4">Order Date</td>
</tr>

<tr class="header">
<th>Product Name</th>
<th>Color</th>
<th>Quantity</th>
<th>Price</th>
</tr>

<tr>
<td>&nbsp;</td>
<td></td>
<td></td>
<td></td>
</tr>

<tr>
<td>&nbsp;</td>
<td></td>
<td></td>
<td></td>
</tr>

<tr>
<td>&nbsp;</td>
<td></td>
<td></td>
<td></td>
</tr>

<tr>
<td>&nbsp;</td>
<td></td>
<td></td>
<td></td>
<td></td>
</tr>

<tr>
<td colspan="4" class="black-bar"></td>
</tr>

<tr>
<td colspan="3">Subtotal</td>
<td></td>
</tr>

<tr>
<td colspan="3">Tax</td>
<td></td>
</tr>

<tr>
<td colspan="3">Shipping</td>
<td class="right">5.95</td>
</tr>

<tr>
<td colspan="3">Total</td>
<td></td>
</tr>

</table>
</div>
</body>
</html>
